  <text x="520" y="338" class="axis-tick" text-anchor="middle">p99.9</text>
  <text x="680" y="338" class="axis-tick" text-anchor="middle">max</text>
  <polyline points="160,309 340,180 520,153 680,146" fill="none" stroke="#2563eb" stroke-width="2.5"/>
