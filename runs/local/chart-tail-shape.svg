  <text x="92" y="137" class="axis-tick" text-anchor="end">100 ms</text>
  <text x="92" y="90"  class="axis-tick" text-anchor="end">1 s</text>
  <text x="92" y="44"  class="axis-tick" text-anchor="end">10 s</text>
