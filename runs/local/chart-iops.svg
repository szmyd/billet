    <text transform="translate(120,294) rotate(-30)">baseline</text>
    <text transform="translate(207,294) rotate(-30)">baseline-alt</text>
    <text transform="translate(294,294) rotate(-30)">md-raid0</text>
    <text transform="translate(381,294) rotate(-30)">md-raid1</text>
    <text transform="translate(468,294) rotate(-30)">ublk-r0-hw1</text>
    <text transform="translate(555,294) rotate(-30)">ublk-r0-hw4</text>
    <text transform="translate(642,294) rotate(-30)">ublk-r1-hw1</text>
