# A billet test run as a Kubernetes Job on Tess.
# The pod binds a block-mode PVC at /dev/billet-target, runs the scripted
# profile series via the image's entrypoint (example/k8s/entrypoint.sh
# baked in at build time), and lands an output archive in its emptyDir
# for kubectl cp.
#
# Per-scenario adjustments to copy + edit:
#   metadata.name                                        -- per-scenario unique (e.g. billet-md-raid0)
#   metadata.namespace                                   -- your Tess namespace (appname-env)
#   metadata.labels/annotations (tess.io/*)              -- your Application / ApplicationInstance / Environment
#   spec.template.metadata.labels.scenario
#   spec.template.spec.volumes[target].persistentVolumeClaim.claimName
#   env.DEVICE_LABEL                                     -- legend / entity prefix
#   env.TARGET_PVC                                       -- same PVC name as above, recorded for audit
#   spec.template.spec.containers[0].image               -- hub.tess.io/<your-org>/billet:<tag>
#
# Metrics are scraped by Sherlock (io.sherlock.metrics/* annotations).
# Adjust io.sherlock.metrics/namespace to your Sherlock metric namespace.
apiVersion: batch/v1
kind: Job
metadata:
  name: billet-baseline
  namespace: billet-dev                   # <-- your Tess namespace (appname-env)
  labels:
    app: billet
    application.tess.io/name: billet
    applicationinstance.tess.io/name: billet-ai       # <-- your ApplicationInstance name
    environment.tess.io/name: dev                     # dev | feature | staging | pre-production | production
  annotations:
    application.tess.io/name: billet
    applicationinstance.tess.io/name: billet-ai
    environment.tess.io/name: dev
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400      # 24 h to collect, then GC
  template:
    metadata:
      labels:
        app: billet
        scenario: baseline
        application.tess.io/name: billet
        applicationinstance.tess.io/name: billet-ai
        environment.tess.io/name: dev
      annotations:
        application.tess.io/name: billet
        applicationinstance.tess.io/name: billet-ai
        environment.tess.io/name: dev
        io.sherlock.logs/namespace: billet
        io.sherlock.metrics/module: prometheus
        io.sherlock.metrics/hosts: "${data.host}:9777/metrics"
        io.sherlock.metrics/namespace: billet          # <-- your Sherlock metric namespace
        io.sherlock.metrics/period: 60s
    spec:
      restartPolicy: Never
      containers:
      - name: billet
        image: hub.tess.io/sds/billet:latest    # <-- your hub.tess.io org and tag
        imagePullPolicy: Always
        # ENTRYPOINT is /usr/local/bin/billet-runner.sh (baked from
        # example/k8s/entrypoint.sh by the image build).
        env:
        - name: DEVICE_PATH
          value: /dev/billet-target
        - name: DEVICE_LABEL
          value: baseline
        - name: TARGET_PVC
          value: billet-baseline-pvc
        - name: DURATION_S
          value: "120"
        - name: QD
          value: "32"
        - name: METRICS_PORT
          value: "9777"
        - name: METRICS_DRAIN_S
          value: "30"
        - name: OUTPUT_DIR
          value: /output
        - name: JOB_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['job-name']
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        ports:
        - name: metrics
          containerPort: 9777
        resources:
          requests:
            cpu: "2"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "2Gi"
        # Block-mode PVC: the target shows up as a raw device, not a
        # mounted filesystem. Filesystem-mode PVCs will not work --
        # they put ext4/xfs in the I/O path and break O_DIRECT.
        volumeDevices:
        - name: target
          devicePath: /dev/billet-target
        volumeMounts:
        - name: output
          mountPath: /output
      volumes:
      - name: target
        persistentVolumeClaim:
          claimName: billet-baseline-pvc
      - name: output
        emptyDir: {}
